<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rational Cryptogram</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #E0F4FF, #81D4FA);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; padding: 20px;
    }
    .page { display: none; width: 100%; max-width: 500px; }
    .page.active { display: block; }
    .container {
      background: rgba(255,255,255,0.95);
      border-radius: 20px; padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    h1 { text-align: center; color: #004D73; margin-bottom: 20px; }
    input, button {
      width: 100%; padding: 12px; margin: 8px 0;
      border-radius: 10px; border: 2px solid #00BCD4;
      font-size: 16px;
    }
    button {
      background: linear-gradient(135deg, #00BCD4, #009688);
      color: white; font-weight: bold; cursor: pointer; border: none;
    }
    button.primary { background: linear-gradient(135deg, #4CAF50, #66BB6A); }
    .timer { font-size: 1.3rem; font-weight: bold; color: #00838F; text-align: center; margin: 10px 0; }
    .timer.warning { color: #D32F2F; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
    .phrase { font-size: 2rem; text-align: center; letter-spacing: 10px; margin: 15px 0; }
    .eq-card { background: #E0F7FA; padding: 12px; margin: 8px 0; border-radius: 10px; }
    .players { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
    .player-badge { background: #B2EBF2; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; }
    .transition-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,188,212,0.3); display: none;
      justify-content: center; align-items: center; z-index: 1000;
      font-size: 2rem; color: white; font-weight: bold;
    }
    .transition-overlay.show { display: flex; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="transition-overlay" id="transitionOverlay">LOADING NEXT LEVEL...</div>

<div id="lobby" class="page active">
  <div class="container">
    <h1>🔐 RATIONAL CRYPTOGRAM</h1>
    <input type="text" id="nameInput" placeholder="Your name" maxlength="20">
    <input type="text" id="codeInput" placeholder="Room code" maxlength="8" style="text-transform:uppercase;">
    <button onclick="joinRoom()">JOIN ROOM</button>
    <button class="primary" onclick="createRoom()">CREATE ROOM</button>
  </div>
</div>

<div id="room" class="page">
  <div class="container">
    <h1>🏠 GAME LOBBY</h1>
    <h2 id="roomCodeDisplay" style="text-align:center; color:#0097A7;"></h2>
    <div id="qrContainer" style="text-align:center; margin:10px 0;"></div>
    <div class="players" id="playerList"></div>
    <button id="startBtn" class="primary" onclick="startGame()" style="display:none;">START GAME</button>
    <p id="waitMsg" style="text-align:center;">Waiting for host...</p>
  </div>
</div>

<div id="game" class="page">
  <div class="container">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
      <span id="levelText">LEVEL 1</span>
      <span class="timer" id="timer">03:00</span>
    </div>
    <div class="phrase" id="cipherDisplay">_ _ _ _ _</div>
    <div id="equations"></div>
    <button onclick="checkAnswers()">SUBMIT ANSWERS</button>
  </div>
</div>

<div id="end" class="page">
  <div class="container">
    <h1>🎉 GAME COMPLETE</h1>
    <p style="text-align:center; font-size:1.2rem;">Score: <strong id="finalScore">0</strong></p>
    <button onclick="backToLobby()">BACK TO LOBBY</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkoqlW8Fb1yhmvrAv7bBM50CyeCUjZKyA",
  authDomain: "rational-cryptogram-game.firebaseapp.com",
  projectId: "rational-cryptogram-game",
  storageBucket: "rational-cryptogram-game.firebasestorage.app",
  messagingSenderId: "654271677921",
  appId: "1:654271677921:web:ac7245dfd3b376a55e3ea0"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const LEVELS = [
  { phrase: "GAUSS", eqs: [
    { q: "x/4 = 2", a: 8 }, { q: "48/3x = 4", a: 4 }, { q: "8x/64 = 1", a: 8 },
    { q: "2x/3 = 6", a: 9 }, { q: "5x/4 = 5", a: 4 }
  ]},
  { phrase: "INDIA", eqs: [
    { q: "(x+4)/2 = 10", a: 16 }, { q: "(x+17)/3 = 9", a: 10 }, { q: "(x+1)/3 = 5", a: 14 },
    { q: "8/(x-2) = 4", a: 4 }, { q: "4/(x-1) = 2", a: 3 }
  ]},
  { phrase: "EULER", eqs: [
    { q: "x/5 + 2 = 7", a: 25 }, { q: "30/x - 1 = 2", a: 10 }, { q: "x/3 + 4 = 14", a: 30 },
    { q: "45/x - 3 = 2", a: 9 }, { q: "x/4 + 1 = 6", a: 20 }
  ]}
];

let roomCode, playerName, isHost = false;
let currentLevel = 0, score = 0, gameEndTime = null;
let timerInterval = null;
const MAX_PLAYERS = 40;

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ✅ PERSISTENT SESSION - survives reloads and back button
function saveSession() {
  if (playerName && roomCode) {
    const sessionData = {
      name: playerName,
      room: roomCode,
      host: isHost,
      score: score,
      level: currentLevel
    };
    localStorage.setItem('crypto_session', JSON.stringify(sessionData));
    sessionStorage.setItem('crypto_session', JSON.stringify(sessionData));
  }
}

function getSession() {
  // Try sessionStorage first (survives back button), then localStorage (survives reload)
  const session = sessionStorage.getItem('crypto_session') || localStorage.getItem('crypto_session');
  return session ? JSON.parse(session) : null;
}

// ✅ RECONNECT HANDLER - restores player state at correct level
async function tryReconnect() {
  const saved = getSession();
  if (!saved) return false;
  
  const snap = await new Promise(res => {
    onValue(ref(db, `rooms/${saved.room}`), res, { onlyOnce: true });
  });
  
  if (!snap.exists()) {
    clearSession();
    return false;
  }
  
  const roomData = snap.val();
  
  // Restore player identity
  playerName = saved.name;
  roomCode = saved.room;
  isHost = saved.host;
  score = saved.score || 0;
  currentLevel = saved.level || 0;
  
  // Re-register presence
  const playerRef = ref(db, `rooms/${roomCode}/players/${playerName}`);
  await set(playerRef, { 
    score: score, 
    lastSeen: serverTimestamp(),
    reconnected: true 
  });
  onDisconnect(playerRef).update({ lastSeen: serverTimestamp() });
  
  // Always update session on reconnect
  saveSession();
  
  // ✅ Check if game is active and restore to correct state
  if (roomData.gameStarted) {
    gameEndTime = roomData.gameEndTime;
    const serverLevel = roomData.currentLevel || 0;
    
    // Always sync to server level (prevents falling behind or ahead)
    currentLevel = serverLevel;
    saveSession();
    
    if (gameEndTime && Date.now() < gameEndTime) {
      showPage('game');
      loadLevel();
      startTimer();
    } else if (gameEndTime && Date.now() >= gameEndTime) {
      showPage('end');
      document.getElementById('finalScore').innerText = score;
    }
  } else {
    showPage('room');
    if (isHost) {
      document.getElementById('startBtn').style.display = 'block';
      document.getElementById('waitMsg').style.display = 'none';
    }
  }
  
  setupListeners(roomCode);
  updatePlayerList(roomCode);
  return true;
}

function clearSession() {
  localStorage.removeItem('crypto_session');
  sessionStorage.removeItem('crypto_session');
}

// ✅ Feature 1: Max 40 players
window.joinRoom = async function() {
  const name = document.getElementById('nameInput').value.trim();
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!name || !code) return alert('Fill all fields');
  
  const roomRef = ref(db, `rooms/${code}`);
  const snap = await new Promise(res => onValue(roomRef, res, { onlyOnce: true }));
  if (!snap.exists()) return alert('Room not found');
  
  const players = snap.child('players').val() || {};
  if (Object.keys(players).length >= MAX_PLAYERS && !players[name]) {
    return alert(`Room full! Maximum ${MAX_PLAYERS} players allowed.`);
  }
  
  playerName = name;
  roomCode = code;
  isHost = false;
  score = 0;
  currentLevel = 0;
  
  const playerRef = ref(db, `rooms/${code}/players/${name}`);
  await set(playerRef, { score: 0, lastSeen: serverTimestamp() });
  onDisconnect(playerRef).update({ lastSeen: serverTimestamp() });
  
  saveSession();
  setupListeners(code);
  showPage('room');
  updatePlayerList(code);
};

window.createRoom = async function() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return alert('Enter your name');
  
  playerName = name;
  isHost = true;
  roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
  score = 0;
  currentLevel = 0;
  
  await set(ref(db, `rooms/${roomCode}`), {
    host: name,
    gameStarted: false,
    currentLevel: 0,
    gameEndTime: null,
    createdAt: serverTimestamp()
  });
  
  const playerRef = ref(db, `rooms/${roomCode}/players/${name}`);
  await set(playerRef, { score: 0, lastSeen: serverTimestamp() });
  onDisconnect(playerRef).update({ lastSeen: serverTimestamp() });
  
  saveSession();
  setupListeners(roomCode);
  showPage('room');
  document.getElementById('roomCodeDisplay').innerText = `Room: ${roomCode}`;
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('waitMsg').style.display = 'none';
  
  const qrDiv = document.getElementById('qrContainer');
  qrDiv.innerHTML = '';
  new QRCode(qrDiv, {
    text: window.location.href.split('?')[0] + '?room=' + roomCode,
    width: 100, height: 100
  });
  
  updatePlayerList(roomCode);
};

function updatePlayerList(code) {
  onValue(ref(db, `rooms/${code}/players`), snap => {
    const players = snap.val() || {};
    const list = document.getElementById('playerList');
    list.innerHTML = Object.entries(players).map(([name, data]) => 
      `<span class="player-badge">👤 ${name} ${data.reconnected ? '🔄' : ''}</span>`
    ).join('');
  });
}

function setupListeners(code) {
  onValue(ref(db, `rooms/${code}`), snap => {
    const data = snap.val();
    if (!data) return;
    
    // ✅ Timer keeps running even when disconnected
    if (data.gameEndTime) {
      gameEndTime = data.gameEndTime;
    }
    
    if (data.gameStarted && document.getElementById('game').classList.contains('active') === false) {
      currentLevel = data.currentLevel || 0;
      saveSession();
      startGameClient();
    }
    
    // ✅ Sync level changes in real-time
    if (data.currentLevel !== undefined && data.currentLevel !== currentLevel) {
      currentLevel = data.currentLevel;
      saveSession();
      if (document.getElementById('game').classList.contains('active')) {
        loadLevel();
      }
    }
  });
}

// ✅ Feature 3: Synchronized timer across all devices
window.startGame = async function() {
  if (!isHost) return;
  const duration = 180; // 3 minutes
  const endTime = Date.now() + duration * 1000;
  
  await update(ref(db, `rooms/${roomCode}`), {
    gameStarted: true,
    currentLevel: 0,
    gameEndTime: endTime
  });
};

function startGameClient() {
  showPage('game');
  loadLevel();
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const timerEl = document.getElementById('timer');
  
  timerInterval = setInterval(() => {
    if (!gameEndTime) return;
    
    // ✅ All devices calculate from same endTime
    const now = Date.now();
    const remaining = Math.max(0, Math.floor((gameEndTime - now) / 1000));
    const mins = Math.floor(remaining / 60);
    const secs = remaining % 60;
    timerEl.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    
    if (remaining <= 30) timerEl.classList.add('warning');
    else timerEl.classList.remove('warning');
    
    if (remaining <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 200);
}

function loadLevel() {
  if (currentLevel >= LEVELS.length) {
    endGame();
    return;
  }
  
  const level = LEVELS[currentLevel];
  document.getElementById('levelText').innerText = `LEVEL ${currentLevel + 1}`;
  document.getElementById('cipherDisplay').innerText = level.phrase.split('').map(() => '_').join(' ');
  
  const eqContainer = document.getElementById('equations');
  eqContainer.innerHTML = level.eqs.map((eq, i) => `
    <div class="eq-card">
      <strong>${eq.q}</strong>
      <input type="number" id="eq${i}" placeholder="x = ?" style="width:80px; margin-left:10px;">
    </div>
  `).join('');
}

// ✅ Feature 4: Smooth level transitions
window.checkAnswers = async function() {
  const level = LEVELS[currentLevel];
  if (!level) return;
  
  let allCorrect = true;
  
  level.eqs.forEach((eq, i) => {
    const input = document.getElementById(`eq${i}`);
    if (!input || parseInt(input.value) !== eq.a) {
      allCorrect = false;
      if (input) input.style.border = '2px solid red';
    } else {
      if (input) input.style.border = '2px solid green';
    }
  });
  
  if (allCorrect) {
    score += 100;
    saveSession();
    
    await update(ref(db, `rooms/${roomCode}/players/${playerName}`), { 
      score: score,
      lastSeen: serverTimestamp()
    });
    
    if (currentLevel + 1 < LEVELS.length) {
      // ✅ Smooth transition
      const overlay = document.getElementById('transitionOverlay');
      overlay.classList.add('show');
      
      await new Promise(resolve => setTimeout(resolve, 300));
      
      if (isHost) {
        await update(ref(db, `rooms/${roomCode}`), { 
          currentLevel: currentLevel + 1 
        });
      }
      
      currentLevel++;
      saveSession();
      loadLevel();
      
      await new Promise(resolve => setTimeout(resolve, 200));
      overlay.classList.remove('show');
    } else {
      endGame();
    }
  }
};

function endGame() {
  if (timerInterval) clearInterval(timerInterval);
  showPage('end');
  document.getElementById('finalScore').innerText = score;
}

window.backToLobby = function() {
  clearSession();
  roomCode = null; 
  playerName = null; 
  isHost = false;
  currentLevel = 0;
  score = 0;
  showPage('lobby');
};

// ✅ Handle page visibility (back button, tab switch)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && playerName && roomCode) {
    // Re-sync timer and level when user returns
    saveSession();
    if (gameEndTime && document.getElementById('game').classList.contains('active')) {
      startTimer(); // Restart timer display
    }
  }
});

// ✅ Handle back button
window.addEventListener('popstate', (event) => {
  if (playerName && roomCode) {
    saveSession();
  }
});

// Auto-reconnect on load
window.addEventListener('load', async () => {
  const reconnected = await tryReconnect();
  if (!reconnected) showPage('lobby');
  
  const params = new URLSearchParams(window.location.search);
  const room = params.get('room');
  if (room) document.getElementById('codeInput').value = room.toUpperCase();
});

// Save session before unload
window.addEventListener('beforeunload', () => {
  saveSession();
});
</script>
</body>
</html>
