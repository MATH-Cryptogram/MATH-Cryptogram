<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATH Cryptogram</title>
    <style>
        body {
            background: url('path/to/pixelated-background.png'); /* Ensure to link to the actual background image */
            color: white;
            font-family: 'Press Start 2P', cursive;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% { background-color: #ff0080; }
            50% { background-color: #8000ff; }
            100% { background-color: #00ffff; }
        }

        .equation {
            padding: 10px;
            border: 2px solid #fff;
            margin: 5px;
            display: inline-block;
        }

        .leaderboard {
            list-style-type: none;
        }
    </style>
</head>
<body>
    <audio id="game-music" loop>
        <source src="path/to/8bit-music.mp3" type="audio/mpeg">
        Your browser does not support the audio tag.
    </audio>

    <script>
        document.getElementById('game-music').play();
        
        // Example: Sorting leaderboard by score
        const leaderboard = [
            {name: 'Player1', score: 100},
            {name: 'Player2', score: 80},
        ];
        leaderboard.sort((a, b) => b.score - a.score);
        
        // Sample code to update equations display
        const equations = [{problem: 'x + 1 = 5', points: 10}, ...];
        equations.forEach(eq => {
            const elem = document.createElement('div');
            elem.className = 'equation';
            elem.innerText = `${eq.problem} - ${eq.points} PTS`;
            document.body.appendChild(elem);
        });

        // Bonus points notification
        function showBonusPoints() {
            alert('You have earned 50 bonus points for completing the hidden word!');
        }
    </script>
</body>
</html>
