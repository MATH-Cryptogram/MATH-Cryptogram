<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Rational Algebraic Cryptogram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* ... Keep your existing CSS exactly as it is ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0f7fa; }
        .page { display: none; width: 90%; max-width: 500px; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .page.active { display: block; }
        button { width: 100%; padding: 15px; margin: 10px 0; background: #00bcd4; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="page-lobby" class="page active">
    <h1>🎮 THE RATIONAL CRYPTOGRAM</h1>
    <input type="text" id="player-name" placeholder="Enter Name">
    <input type="text" id="join-code" placeholder="ROOM CODE">
    <button onclick="confirmAndJoinLobby()">JOIN ROOM</button>
    <button onclick="startAsHost()">CREATE ROOM</button>
</div>

<div id="page-game" class="page">
    <h2 id="lvl-indicator">LEVEL 1</h2>
    <div id="timer" style="font-size: 2rem; font-weight: bold;">03:00</div>
    <div id="problems-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = { /* KEEP YOUR ORIGINAL CONFIG HERE */ };
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomCode = "", playerName = "", isHost = false, gameStartTime = 0;
const DURATION = 180; // 3 minutes

window.startAsHost = function() {
    isHost = true;
    roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
    set(ref(db, "rooms/" + roomCode), { gameStarted: false, level: 1, startTime: 0 });
    setupRoomListeners(roomCode);
    alert("Room created: " + roomCode);
};

window.confirmAndJoinLobby = function() {
    playerName = document.getElementById("player-name").value;
    roomCode = document.getElementById("join-code").value.toUpperCase();
    set(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: 0 });
    setupRoomListeners(roomCode);
    navigate("page-game");
};

function setupRoomListeners(room) {
    onValue(ref(db, `rooms/${room}`), (snapshot) => {
        const data = snapshot.val();
        if (!data) return;

        // Sync Timer: If host set a start time, every student calculates time left from it
        if (data.startTime > 0) {
            gameStartTime = data.startTime;
            startSyncTimer();
        }

        if (data.gameStarted && !isHost) navigate("page-game");
    });
}

// THE FIX: Sync Timer Logic
function startSyncTimer() {
    setInterval(() => {
        if (gameStartTime === 0) return;
        const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
        const timeLeft = Math.max(0, DURATION - elapsed);
        
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById("timer").innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
    }, 1000);
}

// HOST: Trigger the start
window.hostStartGame = function() {
    update(ref(db, "rooms/" + roomCode), { 
        gameStarted: true, 
        startTime: Date.now() // This creates the sync point for everyone
    });
};

function navigate(pageId) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}
</script>
</body>
</html>
