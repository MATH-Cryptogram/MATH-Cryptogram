<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Rational Algebraic Cryptogram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root { 
            --primary: #0EA5E9;
            --secondary: #06B6D4;
            --accent: #10B981;
            --light: #F0F9FF;
            --dark: #0369A1;
        }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: Black; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #E0F4FF 0%, #B3E5FC 25%, #81D4FA 50%, #4FC3F7 75%, #B3E5FC 100%);
            background-attachment: fixed;
            margin: 0;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.05); }
        }

        #page-lobby {
            background: linear-gradient(135deg, #E0F7FA 0%, #B2EBF2 25%, #80DEEA 50%, #4DD0E1 75%, #26C6DA 100%) !important;
            border: 3px solid #00838F !important;
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.5), 0 0 80px rgba(76, 175, 80, 0.3) !important;
            animation: lobbyGlow 3s ease-in-out infinite;
        }

        @keyframes lobbyGlow {
            0%, 100% { 
                box-shadow: 0 0 40px rgba(0, 188, 212, 0.5), 0 0 80px rgba(76, 175, 80, 0.3);
            }
            50% { 
                box-shadow: 0 0 60px rgba(0, 188, 212, 0.7), 0 0 100px rgba(76, 175, 80, 0.5);
            }
        }

        #page-lobby h1 {
            color: #004D73 !important;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7), 0 0 15px rgba(0, 150, 175, 0.3) !important;
            font-size: 2rem !important;
            letter-spacing: 3px;
            font-weight: 800;
        }

        #page-lobby p {
            color: #00695C !important;
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6) !important;
        }

        /* ... rest of styles omitted here for brevity in this commit message ... */
    </style>
</head>
<body>
    <!-- Music Toggle Button -->
    <button class="music-toggle" id="musicToggle" onclick="toggleMusic()">🎵</button>

    <!-- Lobby Page -->
    <div id="page-lobby" class="page active">
        <h1>🎮 THE RATIONAL CRYPTOGRAM</h1>
        <p style="text-align: center; color: var(--light); margin-bottom: 25px;">Solve equations to Decode</p>
        
        <div class="join-section">
            <p>👤 Enter Your Name</p>
            <input type="text" id="player-name" placeholder="Your name" maxlength="20">
        </div>
        
        <div class="join-section">
            <p>🎯 Join a Game</p>
            <input type="text" id="join-code" placeholder="XXXXXX" maxlength="6" style="text-transform: uppercase;">
            <button onclick="joinRoom()">⚡ Enter The Game</button>
        </div>

        <div style="text-align: center; margin: 20px 0; color: var(--secondary);">— OR —</div>

        <button class="primary" onclick="startAsHost()">👑 Start As Host</button>
    </div>

    <!-- Game Page -->
    <div id="page-game" class="page">
        <div class="top-bar">
            <button class="small-btn" onclick="toggleFullScreen()">⛶ FULLSCREEN</button>
            <span id="lvl-indicator">LEVEL 1</span>
            <span id="timer">03:00</span>
        </div>
        
        <div class="phrase-display" id="cipher-output">_ _ _ _</div>
        <div id="clue-text" class="clue-box"></div>
        <div id="problems-container"></div>
        <button onclick="checkAnswers()">🔓 Decode Cryptogram</button>
    </div>

    <!-- ... rest of HTML unchanged ... -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* ORIGINAL SCRIPT CONTINUES... */

/* For compatibility, we'll append a small override script (non-module) to patch listeners and uploads. */
</script>

<!-- Patch script: overrides and fixes (appended) -->
<script>
/* Render scoreboard for host and players */
function renderScoreboard(playersObj) {
    const players = playersObj || {};
    const entries = Object.entries(players);
    const sorted = entries.sort((a, b) => (b[1].score || 0) - (a[1].score || 0));

    const sb = document.getElementById("scoreboard-container");
    if (sb) {
        sb.innerHTML = "";
        sorted.forEach(([name, info], idx) => {
            const div = document.createElement("div");
            div.className = "score-row";
            const medals = ['🥇', '🥈', '🥉'];
            const medal = idx < 3 ? medals[idx] : '👤';
            div.innerHTML = `<span>${medal} ${name}</span><span>${info.score || 0}</span>`;
            sb.appendChild(div);
        });
    }

    const hostSb = document.getElementById("host-scoreboard-container");
    if (hostSb) {
        hostSb.innerHTML = "";
        sorted.forEach(([name, info], idx) => {
            const div = document.createElement("div");
            div.className = "score-row";
            const medals = ['🥇', '🥈', '🥉'];
            const medal = idx < 3 ? medals[idx] : '👤';
            div.innerHTML = `<span>${medal} ${name}</span><span>${info.score || 0}</span>`;
            hostSb.appendChild(div);
        });
    }
}

/* Render uploads gallery (host view) */
function renderUploads() {
    const gallery = document.getElementById("gallery-container");
    const countEl = document.getElementById("upload-count");
    if (!gallery || !countEl) return;

    const items = uploads || {};
    gallery.innerHTML = "";
    const list = Object.entries(items);
    countEl.innerText = list.length;

    list.forEach(([key, info]) => {
        const item = document.createElement("div");
        item.className = "gallery-item";
        const img = document.createElement("img");
        img.src = info.data || "";
        img.alt = info.name || (info.player || "submission");
        const label = document.createElement("div");
        label.className = "gallery-item-label";
        const time = info.time ? new Date(info.time).toLocaleString() : "";
        label.innerText = `${info.player || "player"} • ${info.name || ""} ${time ? " • " + time : ""}`;
        item.appendChild(img);
        item.appendChild(label);
        gallery.appendChild(item);
    });
}

/* Centralized listeners so every client stays in sync */
function setupRoomListeners(room) {
    if (!room) return;
    try {
        const roomRef = ref(db, `rooms/${room}`);
        onValue(roomRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.gameStarted === true && !isHost && !localGameStarted) {
                localGameStarted = true;
                startGame();
            }

            if (data.level) {
                const lvlText = 'LEVEL ' + data.level;
                const lvlIndicator = document.getElementById('lvl-indicator');
                if (lvlIndicator) lvlIndicator.innerText = lvlText;
                const hostGameLevel = document.getElementById('host-game-level');
                if (hostGameLevel) hostGameLevel.innerText = lvlText;
            }
        });

        onValue(ref(db, `rooms/${room}/players`), (snapshot) => {
            const playersData = snapshot.val() || {};
            renderScoreboard(playersData);
        });

        onValue(ref(db, `rooms/${room}/uploads`), (snapshot) => {
            uploads = snapshot.val() || {};
            renderUploads();
        });

        const hostRoomEl = document.getElementById("host-room-code");
        if (hostRoomEl) hostRoomEl.innerText = "🎮 Room Code: " + room;
    } catch(e) { console.warn('Room listener setup failed', e); }
}

/* Ensure host entry is created and listeners attached */
window.startAsHost = function() {
    playerName = document.getElementById("player-name").value.trim();
    if (!playerName) { 
        alert("Enter your name!"); 
        return; 
    }
    
    isHost = true;
    roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
    
    set(ref(db, "rooms/" + roomCode), { gameStarted: false, level: 1 });
    document.getElementById("host-room-code").innerText = "🎮 Room Code: " + roomCode;

    const qrContainer = document.getElementById("qr-code");
    qrContainer.innerHTML = "";
    const joinURL = window.location.origin + window.location.pathname + "?room=" + roomCode;
    try {
        new QRCode(qrContainer, { text: joinURL, width: 128, height: 128 });
    } catch(e) {}

    // Add host to players list so they appear on scoreboard
    set(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: 0 });

    setupRoomListeners(roomCode);
    navigate("page-scoreboard");
};

/* Join room and ensure listeners are attached */
window.joinRoom = function() {
    playerName = document.getElementById("player-name").value.trim();
    roomCode = document.getElementById("join-code").value.trim().toUpperCase();
    
    if (!playerName || !roomCode) {
        alert("Enter name and code!");
        return;
    }

    set(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: 0 });
    setupRoomListeners(roomCode);
    navigate("page-scoreboard");
};

/* Award points per equation/letter solved and update DB immediately */
window.checkAnswers = function() {
    const level = gameData[currentLevelIndex];
    if (!level) return;

    let allCorrect = true;
    let newCorrect = false;
    const pointsPerLetter = 20; // changeable

    level.eqs.forEach((eq, idx) => {
        const input = document.getElementById(`ans-${idx}`);
        const raw = input ? input.value : "";
        const userAns = raw === "" ? NaN : parseInt(raw, 10);

        if (isNaN(userAns) || userAns !== eq.a) {
            allCorrect = false;
            if (input) input.style.border = "2px solid red";
            playErrorBeep();
        } else {
            if (input) input.style.border = "2px solid green";
            if (!solvedIndices.includes(idx)) {
                solvedIndices.push(idx);
                newCorrect = true;

                // award points locally & persist
                score += pointsPerLetter;
                if (roomCode && playerName) {
                    update(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: score });
                }
                playCorrectBeep();
            } else {
                playCorrectBeep();
            }
        }
    });

    if (newCorrect) updateCipherDisplay();

    if (allCorrect) {
        const fullBonus = 50;
        score += fullBonus;
        if (roomCode && playerName) update(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: score });
        playSuccessSound();

        setTimeout(() => {
            const level = gameData[currentLevelIndex];
            document.getElementById("trivia-content").innerText = level.trivia;
            document.getElementById("trivia-author").innerText = `— ${level.author}`;
            document.getElementById("step-by-step").innerText = level.steps;
            navigate("page-trivia");
        }, 500);

        if (isHost) {
            update(ref(db, `rooms/${roomCode}`), { level: currentLevelIndex + 2, gameStarted: true });
        }
    }
};

/* Implement missing upload handler to store images into the DB (dataURL). For production use Firebase Storage. */
window.handleSolutionUpload = function() {
    const fileInput = document.getElementById("solution-upload");
    const statusEl = document.getElementById("upload-status");
    if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
        if (statusEl) { statusEl.className = "upload-status upload-error"; statusEl.innerText = "No file selected."; }
        return;
    }
    const file = fileInput.files[0];
    if (!roomCode || !playerName) {
        if (statusEl) { statusEl.className = "upload-status upload-error"; statusEl.innerText = "You're not in a room. Join a room before uploading."; }
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const dataURL = e.target.result;
        const key = `u_${Date.now()}`;
        const payload = { name: file.name, data: dataURL, player: playerName, time: Date.now() };
        set(ref(db, `rooms/${roomCode}/uploads/${key}`), payload)
            .then(() => {
                if (statusEl) { statusEl.className = "upload-status upload-success"; statusEl.innerText = "Upload submitted! It will appear in the host gallery."; }
            })
            .catch((err) => {
                if (statusEl) { statusEl.className = "upload-status upload-error"; statusEl.innerText = "Upload failed: " + (err.message || err); }
            });
    };
    reader.onerror = function() {
        if (statusEl) { statusEl.className = "upload-status upload-error"; statusEl.innerText = "Failed to read file."; }
    };
    reader.readAsDataURL(file);
};

/* Return to lobby and clear timers */
window.backToLobby = function() {
    try { clearInterval(timerInterval); clearInterval(hostTimerInterval); } catch(e){}
    localGameStarted = false; solvedIndices = []; score = 0; navigate("page-lobby");
};
</script>
</body>
</html>
