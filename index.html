<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Rational Algebraic Cryptogram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root { 
            --primary: #0EA5E9;
            --secondary: #06B6D4;
            --accent: #10B981;
            --light: #F0F9FF;
            --dark: #0369A1;
        }

        html, body {
            position: fixed;
            overflow: hidden;
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: Black; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: linear-gradient(135deg, #E0F4FF 0%, #B3E5FC 25%, #81D4FA 50%, #4FC3F7 75%, #B3E5FC 100%);
            background-attachment: fixed;
            margin: 0;
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.05); }
        }

        #page-lobby {
            background: linear-gradient(135deg, #E0F7FA 0%, #B2EBF2 25%, #80DEEA 50%, #4DD0E1 75%, #26C6DA 100%) !important;
            border: 3px solid #00838F !important;
            box-shadow: 0 0 40px rgba(0, 188, 212, 0.5), 0 0 80px rgba(76, 175, 80, 0.3) !important;
            animation: lobbyGlow 3s ease-in-out infinite;
        }

        @keyframes lobbyGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 188, 212, 0.5), 0 0 80px rgba(76, 175, 80, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 188, 212, 0.7), 0 0 100px rgba(76, 175, 80, 0.5); }
        }

        #page-lobby h1 {
            color: #004D73 !important;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.7), 0 0 15px rgba(0, 150, 175, 0.3) !important;
            font-size: 2rem !important;
            letter-spacing: 3px;
            font-weight: 800;
        }

        #page-lobby p {
            color: #00695C !important;
            font-size: 1.1rem !important;
            font-weight: 600 !important;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6) !important;
        }

        #page-lobby .join-section p {
            color: #004D73 !important;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5) !important;
            font-weight: 700 !important;
        }

        #page-lobby input[type="text"] {
            background: rgba(255, 255, 255, 0.98) !important;
            border: 2px solid #0097A7 !important;
            color: #004D73 !important;
            font-weight: 600;
        }

        #page-lobby input[type="text"]:focus {
            border-color: #00838F !important;
            background: rgba(255, 255, 255, 1) !important;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.6), inset 0 0 5px rgba(76, 175, 80, 0.2) !important;
        }

        #page-lobby button {
            background: linear-gradient(135deg, #00BCD4, #009688) !important;
            color: #FFFFFF !important;
            border: 2px solid #00897B !important;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4) !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #page-lobby button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 188, 212, 0.6) !important;
        }

        #page-lobby button.primary {
            background: linear-gradient(135deg, #4CAF50, #66BB6A) !important;
            border: 2px solid #388E3C !important;
            color: #FFFFFF !important;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4) !important;
            font-size: 1.1rem !important;
        }

        #page-lobby button.primary:hover {
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.6) !important;
        }

        .page {
            width: 92%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            background: rgba(224, 247, 250, 0.98);
            border-radius: 20px;
            border: 3px solid #0097A7;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.4);
            display: none;
        }

        .page.active { display: block; }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center !important;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #0097A7;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 1.3rem;
            margin: 20px 0;
            color: #00838F;
            text-align: center !important;
        }

        p { color: #004D73; }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            font-size: 16px !important;
            border: 2px solid #00BCD4;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.95);
            color: #004D73;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00BCD4, #009688);
            color: White;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0, 150, 175, 0.3);
        }

        button:active { transform: scale(0.98); }
        button.primary { background: linear-gradient(135deg, #4CAF50, #66BB6A); color: White; }

        .join-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 20px 0;
            align-items: center;
        }

        .join-section p {
            font-size: 0.9rem;
            color: #0097A7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .join-section input { max-width: 280px; }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            border: 1px solid #00BCD4;
        }
        .avatar-option {
            font-size: 1.8rem;
            text-align: center;
            padding: 5px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .avatar-option:hover { transform: scale(1.15); }
        .avatar-option.selected {
            background-color: #00BCD4;
            border-color: #00838F;
            transform: scale(1.1);
        }

        .lobby-users-display {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
            padding: 10px;
        }
        .lobby-user-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 12px;
            border: 2px solid #0097A7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
        }
        .lobby-user-avatar { font-size: 2.5rem; margin-bottom: 5px; }
        .lobby-user-name { font-size: 0.85rem; font-weight: bold; color: #004D73; word-break: break-all; }

        .phrase-display {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 15px;
            text-align: center;
            margin: 25px 0;
            padding: 20px;
            background: rgba(0, 188, 212, 0.1);
            border: 2px solid #00BCD4;
            border-radius: 15px;
            color: #0097A7;
            text-transform: uppercase;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .revealed-letter { color: #4CAF50; font-weight: 900; }
        .hidden-letter { color: #9ECAE1; }
        
        .clue-box {
            background: rgba(76, 175, 80, 0.1);
            padding: 15px;
            border-left: 4px solid #4CAF50;
            border-radius: 8px;
            margin: 15px 0;
            font-style: italic;
            color: #004D73;
        }

        .eq-card {
            background: rgba(0, 188, 212, 0.08);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid rgba(0, 188, 212, 0.3);
        }

        .eq-card div { font-size: 1.1rem; margin-bottom: 10px; color: #0097A7; }
        .eq-card input { width: 100px; padding: 10px; text-align: center; font-weight: bold; margin: 10px auto; display: block; }

        .frac { display: inline-block; position: relative; vertical-align: middle; margin: 0 2px; }
        .frac .numb, .frac span:last-child { display: block; padding: 4px 6px; text-align: center; font-size: 0.9em; }
        .frac .numb { border-bottom: 1px solid currentColor; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid rgba(0, 188, 212, 0.3); gap: 10px; }
        .top-bar span { font-weight: bold; color: #0097A7; font-size: 1.1rem; }
        #timer { font-size: 1.3rem; color: #00838F; }
        #timer.warning { color: #D32F2F; animation: pulse-warning 1s infinite; }

        @keyframes pulse-warning { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .small-btn { width: auto !important; padding: 8px 12px !important; font-size: 0.8rem !important; background: rgba(0, 188, 212, 0.2) !important; color: #0097A7 !important; border: 1px solid #0097A7 !important; box-shadow: none !important; margin: 0 !important; }
        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 15px; margin: 8px 0; background: rgba(0, 188, 212, 0.15); border-radius: 8px; border-left: 4px solid #00BCD4; font-weight: bold; }
        .score-row span:first-child { color: #0097A7; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .score-row span:last-child { color: #00838F; font-size: 1.2rem; }

        .solution-box { background: rgba(76, 175, 80, 0.1); padding: 15px; border-left: 4px solid #4CAF50; border-radius: 8px; margin: 15px 0; color: #004D73; line-height: 1.6; }
