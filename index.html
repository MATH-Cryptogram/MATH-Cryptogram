<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Rational Algebraic Cryptogram</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0b0e14; --accent: #f1c40f; --success: #00ff88; --card-bg: rgba(23, 32, 42, 0.95); }
         body { 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            background-color: #5c5c5c;
            /* 8-Bit Brick Pattern */
            background-image: 
                linear-gradient(30deg, #474747 12%, transparent 12.5%, transparent 87%, #474747 87.5%, #474747),
                linear-gradient(150deg, #474747 12%, transparent 12.5%, transparent 87%, #474747 87.5%, #474747),
                linear-gradient(30deg, #474747 12%, transparent 12.5%, transparent 87%, #474747 87.5%, #474747),
                linear-gradient(150deg, #474747 12%, transparent 12.5%, transparent 87%, #474747 87.5%, #474747),
                linear-gradient(60deg, #7a7a7a 25%, transparent 25.5%, transparent 75%, #7a7a7a 75.5%, #7a7a7a),
                linear-gradient(60deg, #7a7a7a 25%, transparent 25.5%, transparent 75%, #7a7a7a 75.5%, #7a7a7a);
            /* Controls the brick size */
            background-size: 40px 70px;
            background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
        }
/* Animation for page switching */
@keyframes slideUpFade {
    from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
}

@keyframes successPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); box-shadow: 0 0 30px var(--success); }
    100% { transform: scale(1); }
}

.page.active {
    display: block;
    animation: slideUpFade 0.6s ease-out forwards;
}

/* Visual feedback for the phrase when completed */
.phrase-complete {
    animation: successPulse 0.8s ease-in-out;
    color: var(--success) !important;
}

/* Fix for the main container to prevent overflow and force fit */
body {
    overflow-x: hidden; /* Prevent horizontal scrolling */
    touch-action: manipulation; /* Improves mobile responsiveness */
}

.page {
    width: 95%; /* Use more of the screen width */
    max-width: 500px;
    max-height: 90vh; /* Ensure it doesn't go off-screen vertically */
    overflow-y: auto; /* Allow scrolling inside the card if content is long */
    padding: 20px;
    box-sizing: border-box; /* Includes padding in width calculation */
}

/* Make equations and inputs smaller on mobile so they stay on one line */
@media (max-width: 480px) {
    .phrase-display { font-size: 1.5rem; letter-spacing: 5px; }
    .eq-card { padding: 10px; font-size: 0.9rem; }
    input { width: 60px; padding: 8px; font-size: 1rem; }
    .frac .numb { padding: 0 2px; }
}

/* Prevent system-level zooming and scrolling issues */
html, body {
    position: fixed; /* Prevents "rubber-banding" on iOS */
    overflow: hidden;
    width: 100%;
    height: 100%;
    -webkit-text-size-adjust: 100%; /* Prevents iOS from changing font sizes */
    touch-action: none; /* Disables double-tap to zoom */
}

.page {
    /* Safe Area Insets for iPhone notches */
    padding-top: calc(20px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    
    width: 92%;
    max-width: 450px;
    max-height: 85vh;
    overflow-y: auto; /* Allows scrolling only inside the game card */
    -webkit-overflow-scrolling: touch; /* Smooth scrolling for iOS */
}

/* Fix for Android/iOS Input Boxes */
input {
    font-size: 16px !important; /* Minimum 16px prevents iOS auto-zoom on focus */
    appearance: none;
    -webkit-appearance: none;
    outline: none;
}

/* Responsive adjustment for small phones */
@media (max-width: 380px) {
    .phrase-display { font-size: 1.2rem !important; letter-spacing: 3px !important; }
    .eq-card { padding: 8px; font-size: 0.85rem; }
    .frac .numb { padding: 0 1px; }
    button { padding: 12px; font-size: 0.9rem; }
}

/* Prevent the background from bouncing on iOS */
html, body {
    position: fixed; 
    overflow: hidden;
    width: 100%;
    height: 100%;
    -webkit-overflow-scrolling: touch;
}

/* Force inputs to be at least 16px to stop the auto-zoom */
input {
    font-size: 16px !important; 
    appearance: none;
    -webkit-appearance: none; /* Removes default iOS inner shadows */
}

/* Adjust for the iPhone Notch */
.page {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
}

    </style>
</head>
<body>
    <div id="page-lobby" class="page active">
        <h1 style="color: var(--primary);">THE RATIONAL CRYPTOGRAM</h1>
        <div class="join-section">
            <input type="text" id="player-name" placeholder="ENTER YOUR NAME" style="width: 200px;">
        </div>
        <div class="join-section">
            <p>ENTER SESSION CODE</p>
            <input type="text" id="join-code" placeholder="XXXXXX" maxlength="6" style="width: 150px; text-transform: uppercase;">
            <button onclick="joinRoom()">ENTER THE GAME</button>
            <button onclick="startAsHost()" style="background: var(--accent); margin-top:10px;">ENTER AS HOST</button>
        </div>
    </div>

    <div id="page-game" class="page">
        <div style="display: flex; justify-content: space-between; align-items: center;">
         <button onclick="toggleFullScreen()" style="width: auto; padding: 5px 15px; font-size: 0.8rem; margin-bottom: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--primary); border-radius: 5px; cursor: pointer;">⛶</button>
            <span id="lvl-indicator" style="color: var(--primary); font-weight: bold;">LEVEL 1</span>
            <span id="timer">03:00</span>
        </div>
        
        <div class="phrase-display" id="cipher-output">_ _ _ _</div>
        <div id="clue-text" class="clue-box"></div>
        <div id="problems-container"></div>
        <button onclick="checkAnswers()">DECODE CRYPTOGRAM</button>
    </div>

    <div id="page-trivia" class="page">
        <h1 style="color: var(--success);">SUCCESS!</h1>
        <p id="trivia-content" style="font-size: 1.1rem; line-height: 1.6;"></p>
        <p id="trivia-author" style="font-style: italic; color: var(--accent);"></p>
        <div id="step-by-step" class="solution-box"></div>
        <button onclick="nextLevel()" id="next-btn">CONTINUE TO NEXT LEVEL ➔</button>
    </div>
     
    <div id="page-scoreboard" class="page">
        <h1 style="color: var(--primary);">LIVE RANKING BOARD</h1>
        <h2 id="host-room-code" style="color:var(--accent);"></h2>
        <div id="qr-code" style="background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 10px 0;"></div>
        <p style="font-size: 0.8rem; color: #888;">Players can scan to join or enter code manually</p>
        <div id="scoreboard-container"></div>
        <button onclick="hostStartGame()" style="margin-top: 20px;">START GAME</button>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// Ensure buttons feel 'snappy' on mobile
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('touchstart', function() {
        this.style.opacity = "0.7";
    });
    btn.addEventListener('touchend', function() {
        this.style.opacity = "1";
    });
});

// Fullscreen helper for Android (iOS Safari does not support Element.requestFullscreen)
window.toggleFullScreen = function() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {
            // iOS doesn't support fullscreen, which is OK
        });
    } else {
        document.exitFullscreen();
    }
}

// Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyD7yJ0PJf3DfJR7zb8oPpUYvXT_lAXmo5I",
  authDomain: "rae-cryptogram-puzzle.firebaseapp.com",
  databaseURL: "https://rae-cryptogram-puzzle-default-rtdb.firebaseio.com",
  projectId: "rae-cryptogram-puzzle",
  storageBucket: "rae-cryptogram-puzzle.firebasestorage.app",
  messagingSenderId: "13379041677",
  appId: "1:13379041677:web:e6c34d01d19770bd55a5c4",
  measurementId: "G-1T5KBVP0W3"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Game data
const gameData = [
    {
        eqs: [
            { q: "2x + 3 = 11", a: 4 },
            { q: "3x - 2 = 10", a: 4 },
            { q: "x/2 = 5", a: 10 }
        ],
        phrase: "GOOD",
        trivia: "Did you know that solving equations is fundamental to all of mathematics?",
        author: "- Math Master",
        steps: "1. Identify the variable\n2. Use inverse operations\n3. Isolate the variable\n4. Simplify and solve!"
    },
    {
        eqs: [
            { q: "5x = 25", a: 5 },
            { q: "x + 7 = 14", a: 7 }
        ],
        phrase: "MATH",
        trivia: "The word 'algebra' comes from the Arabic word 'al-jabr', meaning restoration or completion.",
        author: "- Mathematician",
        steps: "Follow the order of operations: PEMDAS"
    },
    {
        eqs: [
            { q: "4x - 5 = 11", a: 4 },
            { q: "x/3 = 2", a: 6 }
        ],
        phrase: "RULES",
        trivia: "Mathematical equations help us understand the world around us!",
        author: "- Professor",
        steps: "Practice makes perfect. Keep solving!"
    }
];

let playerName = "";
let roomCode = "";
let isHost = false;
let score = 0;
let solvedIndices = [];
let currentLevelIndex = 0;
let localGameStarted = false;
let timerInterval;
let hostTimerInterval;

// Navigation
function navigate(pageId) {
    document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
    });
    document.getElementById(pageId).classList.add('active');
}

// Render scoreboard
function renderScoreboard(playersObj) {
    const players = playersObj || {};
    const entries = Object.entries(players);
    const sorted = entries.sort((a, b) => (b[1].score || 0) - (a[1].score || 0));

    const sb = document.getElementById("scoreboard-container");
    if (sb) {
        sb.innerHTML = "";
        sorted.forEach(([name, info], idx) => {
            const div = document.createElement("div");
            div.className = "score-row";
            const medals = ['🥇', '🥈', '🥉'];
            const medal = idx < 3 ? medals[idx] : '👤';
            div.innerHTML = `<span>${medal} ${name}</span><span>${info.score || 0}</span>`;
            sb.appendChild(div);
        });
    }
}

// Setup room listeners
function setupRoomListeners(room) {
    if (!room) return;
    try {
        onValue(ref(db, `rooms/${room}`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            if (data.gameStarted === true && !isHost && !localGameStarted) {
                localGameStarted = true;
                startGame();
            }

            if (data.level) {
                const lvlText = 'LEVEL ' + data.level;
                const lvlIndicator = document.getElementById('lvl-indicator');
                if (lvlIndicator) lvlIndicator.innerText = lvlText;
            }
        });

        onValue(ref(db, `rooms/${room}/players`), (snapshot) => {
            const playersData = snapshot.val() || {};
            renderScoreboard(playersData);
        });

        const hostRoomEl = document.getElementById("host-room-code");
        if (hostRoomEl) hostRoomEl.innerText = "🎮 Room Code: " + room;
    } catch(e) { 
        console.error('Error setting up listeners:', e);
    }
}

// Start as host
window.startAsHost = function() {
    playerName = document.getElementById("player-name").value.trim();
    if (!playerName) { 
        alert("Enter your name!"); 
        return; 
    }
    
    isHost = true;
    roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
    
    set(ref(db, "rooms/" + roomCode), { gameStarted: false, level: 1 });
    set(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: 0 });

    const qrContainer = document.getElementById("qr-code");
    qrContainer.innerHTML = "";
    const joinURL = window.location.origin + window.location.pathname + "?room=" + roomCode;
    try {
        new QRCode(qrContainer, { text: joinURL, width: 128, height: 128 });
    } catch(e) {}

    setupRoomListeners(roomCode);
    navigate("page-scoreboard");
};

// Join room
window.joinRoom = function() {
    playerName = document.getElementById("player-name").value.trim();
    roomCode = document.getElementById("join-code").value.trim().toUpperCase();
    
    if (!playerName || !roomCode) {
        alert("Enter name and code!");
        return;
    }

    set(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: 0 });
    setupRoomListeners(roomCode);
    navigate("page-scoreboard");
};

// Start game
window.hostStartGame = function() {
    if (isHost && roomCode) {
        update(ref(db, `rooms/${roomCode}`), { gameStarted: true, level: 1 });
    }
    startGame();
}

function startGame() {
    currentLevelIndex = 0;
    solvedIndices = [];
    navigate("page-game");
    renderGameProblems();
    startTimer();
}

function renderGameProblems() {
    const level = gameData[currentLevelIndex];
    if (!level) return;

    const container = document.getElementById("problems-container");
    container.innerHTML = "";
    level.eqs.forEach((eq, idx) => {
        const card = document.createElement("div");
        card.className = "eq-card";
        card.style.cssText = "background: var(--card-bg); padding: 12px; border-radius: 8px; border-left: 3px solid var(--primary); margin-bottom: 10px; color: white;";
        card.innerHTML = `
            <strong>Eq ${idx + 1}:</strong> ${eq.q}<br>
            <input type="number" id="ans-${idx}" placeholder="Answer" style="margin-top: 8px; padding: 8px; border-radius: 4px; border: 1px solid var(--primary); color: black; width: 100%; box-sizing: border-box;">
        `;
        container.appendChild(card);
    });

    document.getElementById("clue-text").innerText = "Solve each equation to reveal the cryptogram!";
    updateCipherDisplay();
}

function updateCipherDisplay() {
    const level = gameData[currentLevelIndex];
    if (!level) return;

    let display = "";
    for (let i = 0; i < level.phrase.length; i++) {
        display += (solvedIndices.includes(i) ? level.phrase[i] : "_") + " ";
    }
    document.getElementById("cipher-output").innerText = display.trim();
}

// Check answers
window.checkAnswers = function() {
    const level = gameData[currentLevelIndex];
    if (!level) return;

    let allCorrect = true;
    let newCorrect = false;

    level.eqs.forEach((eq, idx) => {
        const input = document.getElementById(`ans-${idx}`);
        const val = input ? parseInt(input.value) : NaN;

        if (isNaN(val) || val !== eq.a) {
            allCorrect = false;
            if (input) input.style.borderColor = "red";
        } else {
            if (input) input.style.borderColor = "green";
            if (!solvedIndices.includes(idx)) {
                solvedIndices.push(idx);
                newCorrect = true;
                score += 20;
                if (roomCode && playerName) {
                    update(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: score });
                }
            }
        }
    });

    if (newCorrect) updateCipherDisplay();

    if (allCorrect) {
        score += 50;
        if (roomCode && playerName) {
            update(ref(db, `rooms/${roomCode}/players/${playerName}`), { score: score });
        }

        setTimeout(() => {
            const level = gameData[currentLevelIndex];
            document.getElementById("trivia-content").innerText = level.trivia;
            document.getElementById("trivia-author").innerText = level.author;
            document.getElementById("step-by-step").innerText = level.steps;
            navigate("page-trivia");
        }, 400);
    }
};

// Next level
window.nextLevel = function() {
    currentLevelIndex++;
    if (currentLevelIndex >= gameData.length) {
        alert("🎉 Congratulations! You've completed all levels!");
        navigate("page-lobby");
    } else {
        solvedIndices = [];
        navigate("page-game");
        renderGameProblems();
        startTimer();
    }
};

// Timer
function startTimer() {
    let time = 180;
    clearInterval(timerInterval);
    
    timerInterval = setInterval(() => {
        const mins = Math.floor(time / 60);
        const secs = time % 60;
        document.getElementById("timer").innerText = 
            (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
        
        if (time <= 0) {
            clearInterval(timerInterval);
            alert("Time's up!");
            nextLevel();
        }
        time--;
    }, 1000);
}

// Check for room code in URL
const urlParams = new URLSearchParams(window.location.search);
const room = urlParams.get("room");
if (room) {
    document.getElementById("join-code").value = room;
}
</script>
</body>
</html>
